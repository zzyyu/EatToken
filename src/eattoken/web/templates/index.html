<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EatToken</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="header">
    <div class="header-copy">
      <h1 data-i18n="app_title">EatToken</h1>
      <p data-i18n="app_subtitle">Rapidly consume LLM API tokens</p>
    </div>
    <button id="lang-toggle" class="lang-btn" data-i18n="button_switch_lang">中文</button>
  </div>

  <main class="app-layout">
    <section class="config-column">
      <form id="config-form" class="config-form">
        <div class="field field-target">
          <label data-i18n="form_target_tokens">Target Tokens</label>
          <input name="target_tokens" type="number" placeholder="Leave empty to run until stopped" data-i18n-placeholder="placeholder_target_tokens" min="1" />
        </div>
        <div class="field">
          <label data-i18n="form_api_url">API URL</label>
          <input name="api_url" placeholder="https://api.openai.com/v1" data-i18n-placeholder="placeholder_api_url" required />
        </div>
        <div class="field">
          <label data-i18n="form_api_key">API Key</label>
          <input name="api_key" type="password" placeholder="sk-..." data-i18n-placeholder="placeholder_api_key" required autocomplete="off" />
        </div>
        <div class="field">
          <label data-i18n="form_provider">Provider</label>
          <select name="provider" required>
            <option value="auto" data-i18n="provider_auto" selected>Auto Detect</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google</option>
          </select>
        </div>
        <div class="field">
          <label data-i18n="form_model">Model</label>
          <input name="model" placeholder="gpt-4o" data-i18n-placeholder="placeholder_model" required />
        </div>

        <details class="advanced">
          <summary data-i18n="advanced_options">Advanced Options</summary>
          <div class="field">
            <label data-i18n="form_context_size">Context Size Override</label>
            <input name="context_size" type="number" placeholder="Auto-detect from model registry" data-i18n-placeholder="placeholder_context_size" min="1" />
          </div>
          <div class="field">
            <label data-i18n="form_max_input">Max Input Tokens</label>
            <input name="max_input_tokens" type="number" value="1024" placeholder="1024 tokens per request" data-i18n-placeholder="placeholder_max_input" min="1" />
          </div>
          <div class="field">
            <label data-i18n="form_max_output">Max Output Tokens</label>
            <input name="max_output_tokens" type="number" value="256" placeholder="256 tokens per response" data-i18n-placeholder="placeholder_max_output" min="1" />
          </div>
          <div class="field">
            <label data-i18n="form_request_timeout">Request Timeout</label>
            <input name="request_timeout_seconds" type="number" value="30" placeholder="30 seconds" data-i18n-placeholder="placeholder_request_timeout" min="1" />
          </div>
          <div class="field">
            <label data-i18n="form_concurrency">Concurrency Override</label>
            <input name="concurrency" type="number" placeholder="Auto-detect from rate limit" data-i18n-placeholder="placeholder_concurrency" min="1" />
          </div>
        </details>

        <div class="actions">
          <button type="submit" id="btn-start" class="btn-primary" data-i18n="button_start">Start</button>
          <button type="button" class="btn-danger" id="btn-stop" style="display:none" data-i18n="button_stop">Stop</button>
        </div>
      </form>
    </section>

    <aside class="runtime-panel" aria-live="polite">
      <div class="panel-heading">
        <div>
          <span class="panel-kicker" data-i18n="panel_kicker">LIVE RUN</span>
          <h2 data-i18n="panel_title">Runtime</h2>
          <p data-i18n="panel_subtitle">Usage, throughput and request logs</p>
        </div>
        <span id="status-chip" class="status-chip" data-i18n="status_ready">Ready</span>
      </div>

      <div id="progress" class="progress">
        <div class="progress-caption">
          <span data-i18n="progress_label">Progress</span>
          <strong id="progress-label">—</strong>
        </div>
        <div id="progress-bar" class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="stats">
          <div class="stat"><span data-i18n="progress_consumed">Consumed</span> <strong id="stat-consumed">0</strong></div>
          <div class="stat"><span data-i18n="progress_target">Target</span> <strong id="stat-target">—</strong></div>
          <div class="stat"><span data-i18n="progress_qps">QPS</span> <strong id="stat-qps">0.0</strong></div>
          <div class="stat"><span data-i18n="progress_in_flight">In flight</span> <strong id="stat-in-flight">0</strong></div>
          <div class="stat"><span data-i18n="progress_success">Success</span> <strong id="stat-success">0</strong></div>
          <div class="stat"><span data-i18n="progress_failed">Failed</span> <strong id="stat-failed">0</strong></div>
          <div class="stat"><span data-i18n="progress_elapsed">Elapsed</span> <strong id="stat-elapsed">0.0s</strong></div>
        </div>
      </div>

      <section class="log-panel">
        <div class="log-heading">
          <h3 data-i18n="logs_title">Request log</h3>
          <span class="live-dot" aria-hidden="true"></span>
        </div>
        <div id="log" class="log">
          <div id="log-empty" class="log-empty" data-i18n="logs_empty">No run yet. Configure a provider and start when ready.</div>
        </div>
      </section>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
